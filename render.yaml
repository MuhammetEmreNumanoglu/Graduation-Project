services:
  - type: web
    name: iyi-hisset-sistem
    env: python
    buildCommand: "chmod +x build.sh && ./build.sh"
    startCommand: "cd men && gunicorn men.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DJANGO_DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
